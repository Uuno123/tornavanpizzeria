<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tilaus vastaanotettu – Törnävän Pizzeria</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FFF8EC;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    /* --- Logo --- */
    .top-logo {
      margin-bottom: 40px;
    }
    .top-logo img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: block;
      margin: 0 auto;
    }

    /* --- Card --- */
    .card {
      background: #fff;
      border-radius: 24px;
      border-top: 5px solid #F5A800;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }

    /* --- Animated checkmark --- */
    .card-header {
      background: #1a1008;
      padding: 40px 32px 36px;
      text-align: center;
    }

    .check-wrap {
      width: 72px;
      height: 72px;
      background: #F5A800;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .check-wrap svg {
      width: 36px;
      height: 36px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw 0.4s 0.3s ease forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .card-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 0.92rem;
      color: #aaa;
      line-height: 1.5;
    }

    .card-header .email-note {
      margin-top: 10px;
      display: inline-block;
      background: rgba(245,168,0,0.15);
      color: #F5A800;
      border: 1px solid rgba(245,168,0,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* --- Order body --- */
    .card-body {
      padding: 28px 32px;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 14px;
      font-weight: 700;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0ede6 25%, #faf8f3 50%, #f0ede6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 18px;
      margin-bottom: 10px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Item rows */
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 13px 0;
      border-bottom: 1px solid #F5F3EE;
      gap: 12px;
      animation: fadeIn 0.3s ease both;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .item-left { flex: 1; }
    .item-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1008;
    }
    .item-custom {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 3px;
    }
    .item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .item-qty {
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      background: #1a1008;
      padding: 2px 9px;
      border-radius: 20px;
    }
    .item-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #1a1008;
      letter-spacing: 0.5px;
    }

    /* Total row */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 18px;
      margin-top: 4px;
      border-top: 2px solid #F5A800;
    }
    .total-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: #1a1008;
      letter-spacing: 1px;
    }
    .total-amount {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: #F5A800;
      letter-spacing: 1px;
    }

    /* Buttons */
    .btn-group {
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid #F5F3EE;
    }

    .btn-primary {
      background: #F5A800;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 0.9rem 2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(245,168,0,0.35);
      transition: background 0.2s, transform 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-primary:hover { background: #D48A00; transform: translateY(-2px); }

    .btn-secondary {
      background: transparent;
      color: #1a1008;
      border: 2px solid #e5e0d8;
      border-radius: 50px;
      padding: 0.85rem 2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-secondary:hover { border-color: #F5A800; color: #F5A800; }

    /* Error state */
    .error-msg {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <div class="top-logo">
    <img src="logo.png" alt="Törnävän Pizzeria">
  </div>

  <div class="card">
    <div class="card-header">
      <div class="check-wrap">
        <svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 7"/></svg>
      </div>
      <h1>Tilaus vastaanotettu!</h1>
      <p id="greeting">Kiitos tilauksestasi. Valmistamme sen heti.</p>
      <span class="email-note">📧 Kuitti lähetetty sähköpostiisi</span>
    </div>

    <div class="card-body">
      <p class="section-label">Tilauksesi</p>
      <div id="orderItems">
        <div class="skeleton" style="width:80%"></div>
        <div class="skeleton" style="width:60%"></div>
        <div class="skeleton" style="width:70%"></div>
      </div>
      <div class="total-row" id="totalRow" style="display:none;">
        <span class="total-label">Yhteensä</span>
        <span class="total-amount" id="totalAmount">—</span>
      </div>
    </div>

    <div class="btn-group">
      <a href="menu.html" class="btn-primary">Tilaa lisää</a>
      <a href="index.html" class="btn-secondary">Takaisin etusivulle</a>
    </div>
  </div>

  <script>
    (function () {
      // Tyhjennä ostoskori
      localStorage.removeItem('cart');

      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      if (!sessionId) {
        document.getElementById('orderItems').innerHTML = '<p class="error-msg">Tilaustietoja ei löydy.</p>';
        return;
      }

      fetch(`/api/session?session_id=${encodeURIComponent(sessionId)}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) throw new Error(data.error);

          if (data.customerName) {
            document.getElementById('greeting').textContent =
              `Kiitos, ${data.customerName}! Valmistamme tilauksen heti.`;
          }

          const container = document.getElementById('orderItems');
          container.innerHTML = '';

          (data.items || []).forEach((item, i) => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.style.animationDelay = `${i * 0.07}s`;
            row.innerHTML = `
              <div class="item-left">
                <p class="item-name">${item.name || 'Tuote'}</p>
                ${item.customization ? `<p class="item-custom">${item.customization}</p>` : ''}
              </div>
              <div class="item-right">
                <span class="item-qty">×${item.quantity}</span>
                <span class="item-price">${item.total} €</span>
              </div>`;
            container.appendChild(row);
          });

          document.getElementById('totalAmount').textContent = data.total + ' €';
          document.getElementById('totalRow').style.display = 'flex';
        })
        .catch(() => {
          document.getElementById('orderItems').innerHTML =
            '<p class="error-msg">Tilaus on vastaanotettu. Kuitti on lähetetty sähköpostiisi.</p>';
          document.getElementById('totalRow').style.display = 'none';
        });
    })();
  </script>
</body>
</html>
